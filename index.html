<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Welcome Home, Zaiiny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">

<!--
  ============================================================
  A NOTE FOR YOU (the person building this):
  - Search "EDIT ME" for every spot meant for your own words,
    real memories, or photos.
  - To add a real photo to a lantern memory, find the
    memories array in the script and add: photo: "your-url.jpg"
  - To add music, uncomment the <audio> tag below body-open
    and point it at your own file.
  - This is a click-to-explore world, not a scrolling page —
    every location is its own full-screen scene.
  ============================================================
-->

<style>
  :root{
    --font-display:'Playfair Display', Georgia, serif;
    --font-script:'Dancing Script', cursive;
    --font-body:'Cormorant Garamond', Georgia, serif;
    --cream:#FBF3E6;
    --gold:#FFD87A;
    --rose:#E88FA0;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; background:#050310;
    font-family:var(--font-body); color:var(--cream);
  }
  h1,h2,h3{ font-family:var(--font-display); font-weight:600; margin:0; }
  .script{ font-family:var(--font-script); }
  button{ font-family:inherit; }
  ::selection{ background:var(--rose); color:#fff; }

  #app{ position:fixed; inset:0; overflow:hidden; }
  #stage{ position:absolute; inset:0; }
  .scene{
    position:absolute; inset:0; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:6vh 5vw;
  }
  .ambient{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2; }
  .ground{ position:absolute; inset:0; z-index:1; }
  .content{ position:relative; z-index:5; max-width:600px; }

  .eyebrow{
    letter-spacing:.35em; text-transform:uppercase; font-size:.65rem; opacity:.75;
    margin-bottom:1rem;
  }

  /* ---- transition veil ---- */
  #veil{
    position:fixed; inset:0; z-index:200; pointer-events:none;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,216,122,.10), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(232,143,160,.10), transparent 45%),
      linear-gradient(160deg, #0c0818, #1b1330 55%, #0c0818);
    transform:translateX(-100%);
  }
  .veil-cover{ transition:transform .68s cubic-bezier(.76,0,.24,1); transform:translateX(0); }
  .veil-reveal{ transition:transform .68s cubic-bezier(.76,0,.24,1); transform:translateX(100%); }
  .veil-reset{ transition:none !important; transform:translateX(-100%); }

  /* ---- hotspots ---- */
  .hotspot{
    position:absolute; background:none; border:none; cursor:pointer; z-index:6;
    padding:0; line-height:1; pointer-events:auto;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.35));
    transition:transform .3s ease;
  }
  .hotspot:hover, .hotspot:focus-visible{ transform:scale(1.12); }
  .hotspot:focus-visible{ outline:2px solid var(--gold); outline-offset:4px; border-radius:10px; }
  .hotspot .tag{
    position:absolute; bottom:110%; left:50%; transform:translateX(-50%);
    background:rgba(20,12,32,.85); border:1px solid rgba(255,255,255,.2);
    padding:.25rem .6rem; border-radius:999px; font-size:.68rem; white-space:nowrap;
    opacity:0; transition:opacity .25s ease; letter-spacing:.03em;
  }
  .hotspot:hover .tag, .hotspot:focus-visible .tag{ opacity:1; }

  /* ---- generic sky elements ---- */
  .star{ position:absolute; background:#fff; border-radius:50%; animation:twinkle ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:.2;} 50%{opacity:1;} }
  .firefly{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle,#fff8cf 0%, var(--gold) 60%, transparent 100%);
    box-shadow:0 0 8px 3px rgba(255,216,122,.7);
    animation:driftfly 9s ease-in-out infinite, pulse 2.3s ease-in-out infinite;
  }
  @keyframes driftfly{ 0%,100%{transform:translate(0,0);} 33%{transform:translate(30px,-24px);} 66%{transform:translate(-20px,16px);} }
  @keyframes pulse{ 0%,100%{opacity:.25;} 50%{opacity:1;} }
  .cloud{
    position:absolute; border-radius:50%; background:rgba(255,255,255,.12);
    filter:blur(1px); animation:drift linear infinite;
  }
  @keyframes drift{ from{ transform:translateX(-20vw);} to{ transform:translateX(120vw);} }
  .bird{ position:absolute; font-size:14px; opacity:.8; animation:flyacross 9s linear forwards; }
  @keyframes flyacross{ from{ transform:translate(-10vw,0);} to{ transform:translate(110vw,-6vh);} }
  .petal{ position:absolute; top:-5vh; animation:fall linear infinite; opacity:.85; }
  @keyframes fall{ 0%{transform:translate(0,0) rotate(0deg);} 100%{transform:translate(var(--drift,40px),110vh) rotate(360deg);} }
  .shooting-star{
    position:absolute; width:3px; height:3px; border-radius:50%; background:#fff;
    box-shadow:0 0 6px 2px #fff, -40px 8px 10px 2px rgba(255,255,255,.5);
    animation:shoot 1.8s linear forwards; cursor:pointer; z-index:7; pointer-events:auto;
  }
  @keyframes shoot{ from{ transform:translate(0,0);} to{ transform:translate(-46vw,26vh);} }

  /* ---- shared note card / modal ---- */
  .note-card{
    background:rgba(28,18,42,.55); border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(6px); border-radius:18px; padding:1.6rem 1.8rem;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
  }
  #modal-overlay{
    position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center;
    background:rgba(8,4,16,.75); backdrop-filter:blur(4px); padding:5vw;
  }
  #modal-overlay.show{ display:flex; }
  .modal-card{
    max-width:520px; width:100%; text-align:left;
    background:linear-gradient(180deg, rgba(45,32,60,.96), rgba(28,18,42,.98));
    border:1px solid rgba(255,255,255,.2); border-radius:20px; padding:2.1rem 1.9rem;
    box-shadow:0 30px 80px rgba(0,0,0,.5); animation:pop .35s ease;
  }
  @keyframes pop{ from{opacity:0; transform:scale(.94) translateY(10px);} to{opacity:1; transform:scale(1) translateY(0);} }
  .modal-card h3{ font-size:1.3rem; color:var(--gold); margin-bottom:.7rem; }
  .modal-card p{ line-height:1.65; font-size:1.06rem; margin:0 0 .8rem; }
  .modal-photo{
    width:100%; height:150px; border-radius:12px; margin-bottom:1rem;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:1rem;
    background:repeating-linear-gradient(45deg, rgba(255,255,255,.06) 0 10px, rgba(255,255,255,.02) 10px 20px);
    border:1px dashed rgba(255,255,255,.3); font-size:.78rem; opacity:.6;
  }
  .modal-close{
    margin-top:.4rem; background:none; border:1px solid rgba(255,255,255,.35); color:var(--cream);
    padding:.5rem 1.2rem; border-radius:999px; cursor:pointer; letter-spacing:.08em;
    text-transform:uppercase; font-size:.7rem;
  }
  .modal-close:hover{ background:rgba(255,255,255,.12); }

  /* ---- wayfinder nav ---- */
  #wayfinder{
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:60;
    display:flex; gap:.5rem; background:rgba(15,9,26,.55); border:1px solid rgba(255,255,255,.15);
    border-radius:999px; padding:.4rem; backdrop-filter:blur(6px);
  }
  #wayfinder button{
    width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(255,255,255,.08); font-size:1.05rem; color:var(--cream);
    display:flex; align-items:center; justify-content:center; transition:background .25s ease, transform .25s ease;
    opacity:0; transform:scale(.4); animation:unlock .4s ease forwards;
  }
  #wayfinder button.current{ background:linear-gradient(135deg, var(--gold), var(--rose)); }
  #wayfinder button:hover{ transform:scale(1.1); }
  @keyframes unlock{ to{ opacity:1; transform:scale(1); } }

  .prompt{ margin-top:1.6rem; font-size:.9rem; opacity:.7; animation:bob 2.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(7px);} }

  /* ============ scene-specific backgrounds ============ */
  .scene-intro{ background:#050310; }
  .scene-entrance{ background:linear-gradient(180deg,#241c3f,#170f27 60%,#0f0a1c); }
  .scene-garden{ background:linear-gradient(180deg,#2c2350,#1c1533 65%,#120c22); }
  .scene-river{ background:linear-gradient(180deg,#20264a,#151a33 65%,#0d1122); }
  .scene-cottage{ background:linear-gradient(180deg,#1f1a3a,#150f28 65%,#0d0a1c); }
  .scene-interior{ background:radial-gradient(circle at 50% 70%, #4a2f22, #241708 70%); }
  .scene-tree{ background:linear-gradient(180deg,#231a3d,#160f28 65%,#0d0a1c); }
  .scene-secret{ background:radial-gradient(ellipse at 50% 10%, rgba(255,214,235,.16), transparent 60%), linear-gradient(180deg,#3a2a4a,#26203e 60%,#1c1830); }
  .scene-dock{ background:linear-gradient(180deg,#0d0e24,#0a0c1d 60%,#070818); }
  .scene-hill{ background:linear-gradient(180deg,#ffb27a,#e88fa0 45%,#7c6a9c 85%,#4a3a72); }

  /* ---- entrance gate ---- */
  .gate-frame{ position:relative; width:min(60vw,320px); height:min(60vw,320px); margin:0 auto 1rem; }
  .gate-arch{ position:absolute; inset:0; border-radius:50% 50% 8px 8px / 60% 60% 8px 8px; border:8px solid #f4ede0; box-shadow:0 0 40px rgba(255,255,255,.12) inset; }
  .gate-doors{ position:absolute; inset:8px; display:flex; overflow:hidden; border-radius:50% 50% 6px 6px / 60% 60% 6px 6px; }
  .gate-door{ width:50%; height:100%; background:repeating-linear-gradient(90deg,#efe6d4 0 6px,#e6dac2 6px 12px); transition:transform 1.1s cubic-bezier(.65,0,.35,1); }
  .gate-door.l{ transform-origin:left center; border-right:2px solid rgba(0,0,0,.1);} 
  .gate-door.r{ transform-origin:right center; border-left:2px solid rgba(0,0,0,.1);} 
  .scene-entrance.opened .gate-door.l{ transform:rotateY(-80deg); }
  .scene-entrance.opened .gate-door.r{ transform:rotateY(80deg); }

  /* ---- flower field ---- */
  .flower-field{ position:relative; width:min(94vw,820px); height:44vh; min-height:300px; margin-top:.5rem; }
  .flower{ font-size:clamp(1.5rem,3.2vw,2.2rem); animation:sway 4.5s ease-in-out infinite; transform-origin:bottom center; }
  @keyframes sway{ 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(4deg);} }
  .flower.bloomed{ animation:bloom .5s ease forwards; }
  @keyframes bloom{ 0%{transform:scale(1);} 50%{transform:scale(1.5) rotate(0deg);} 100%{transform:scale(1.15) rotate(0deg);} }
  .rabbit{ font-size:1.6rem; animation:hop 3.2s ease-in-out infinite; }
  @keyframes hop{ 0%,100%{transform:translateY(0);} 45%{transform:translateY(-10px);} 55%{transform:translateY(-10px);} }

  /* ---- river / bridge ---- */
  .river-band{ position:relative; width:min(94vw,860px); height:90px; border-radius:44px; overflow:hidden; background:linear-gradient(180deg,#4c6b9c,#28345a); box-shadow:0 8px 30px rgba(0,0,0,.4); margin-top:1rem; }
  .river-band::before{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(120deg, rgba(255,255,255,.16) 0 2px, transparent 2px 40px); animation:shimmer 6s linear infinite; }
  @keyframes shimmer{ 0%{background-position:0 0;} 100%{background-position:200px 0;} }
  .duck,.leaf{ position:absolute; animation:floatriver linear infinite; }
  .duck{ font-size:1.2rem; top:16px; } .leaf{ font-size:.85rem; top:44px; opacity:.8; }
  @keyframes floatriver{ 0%{left:-8%;} 100%{left:108%;} }
  .bridge-btn{ position:relative; margin-top:1.6rem; background:linear-gradient(180deg,#8a6a4a,#6b4e34); border:none; border-radius:8px; padding:.9rem 1.6rem; color:var(--cream); cursor:pointer; font-size:.95rem; letter-spacing:.05em; box-shadow:0 8px 20px rgba(0,0,0,.35); }
  .bridge-btn:hover{ filter:brightness(1.1); }

  /* ---- cottage ---- */
  .cottage-scene{ position:relative; width:min(80vw,420px); }
  .smoke{ animation:rise 4s ease-in-out infinite; }
  @keyframes rise{ 0%{opacity:.55; transform:translateY(0);} 100%{opacity:0; transform:translateY(-38px) translateX(6px);} }
  .door-hit{ cursor:pointer; }
  .cat{ position:absolute; font-size:1.4rem; }

  /* ---- memory tree ---- */
  .tree-wrap{ position:relative; width:min(90vw,700px); height:48vh; min-height:340px; }
  .trunk{ position:absolute; left:50%; bottom:0; width:20px; height:36%; background:linear-gradient(180deg,#6b4a3a,#4a3226); transform:translateX(-50%); border-radius:6px 6px 0 0; }
  .canopy{ position:absolute; left:50%; top:0; width:86%; height:60%; transform:translateX(-50%); }
  .blossom{ position:absolute; border-radius:50%; background:radial-gradient(circle at 35% 30%,#ffd9e6,var(--rose)); opacity:.9; }
  .lantern{ position:absolute; width:24px; height:32px; animation:swingL 4.5s ease-in-out infinite; transform-origin:top center; }
  @keyframes swingL{ 0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg);} }
  .lantern-string{ position:absolute; left:50%; top:-28px; width:1px; height:28px; background:rgba(255,255,255,.4); transform:translateX(-50%); }
  .lantern-glass{ width:100%; height:100%; border-radius:50% 50% 40% 40%; background:radial-gradient(circle at 40% 30%,#fff3c4,var(--gold)); box-shadow:0 0 16px 6px rgba(255,216,122,.55); }

  /* ---- secret garden ---- */
  .secret-title{ font-family:var(--font-script); font-size:clamp(1.6rem,4vw,2.3rem); color:#ffd6e8; }
  .secret-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:1rem; max-width:760px; margin-top:1.6rem; }
  .secret-card{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); border-radius:16px; padding:1.1rem 1.1rem; text-align:left; animation:hoverf 5s ease-in-out infinite; }
  .secret-card:nth-child(2n){ animation-delay:.6s; } .secret-card:nth-child(3n){ animation-delay:1.2s; }
  @keyframes hoverf{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .secret-card .icon{ font-size:1.4rem; display:block; margin-bottom:.4rem; }
  .secret-card p{ margin:0; font-size:.96rem; line-height:1.5; }

  /* ---- dock ---- */
  .moon-lg{ width:64px; height:64px; border-radius:50%; margin-bottom:1.2rem; background:radial-gradient(circle at 38% 32%,#fffef2,#ffe9a8 60%,#ffd87a 100%); box-shadow:0 0 60px 18px rgba(255,233,168,.35); }
  .dock-planks{ width:min(80vw,520px); height:22px; margin-bottom:1.6rem; background:repeating-linear-gradient(90deg,#6b4e34 0 34px,#573f2a 34px 38px); border-radius:4px; box-shadow:0 10px 24px rgba(0,0,0,.35); }

  /* ---- hill ---- */
  .valley{ position:relative; width:min(90vw,760px); height:200px; margin-bottom:1.2rem; border-radius:16px; overflow:hidden; }
  .hill-layer{ position:absolute; bottom:0; left:0; width:100%; }
  .hill-back{ height:70%; background:#2c2050; clip-path:polygon(0 60%,20% 40%,45% 55%,70% 30%,100% 50%,100% 100%,0 100%); }
  .hill-front{ height:45%; background:#1c1636; clip-path:polygon(0 70%,25% 45%,55% 65%,80% 35%,100% 60%,100% 100%,0 100%); }
  .valley .glow-dot{ position:absolute; bottom:22%; left:48%; width:9px; height:9px; border-radius:50%; background:var(--gold); box-shadow:0 0 16px 6px rgba(255,216,122,.7); }

  @media (max-width:640px){
    .modal-card{ padding:1.5rem 1.2rem; }
    .secret-grid{ grid-template-columns:1fr; }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }
</style>
</head>
<body>

<!-- Optional music — uncomment and point at your own file
<audio id="bg-music" src="12.mp3" loop autoplay style="display:none"></audio>
-->

<div id="app">
  <div id="stage"></div>
  <nav id="wayfinder" aria-label="Places you've discovered"></nav>
</div>
<div id="veil"></div>

<div id="modal-overlay">
  <div class="modal-card" id="modal-card"></div>
</div>

<script>
(function(){
"use strict";

/* ---------------- small helpers ---------------- */
function q(sel, root){ return (root||document).querySelector(sel); }
function make(tag, cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function rand(min,max){ return min + Math.random()*(max-min); }

function hotspotHTML(opts){
  // opts: action, payload, left, top, emoji, label, size, extra
  return `<button class="hotspot ${opts.extra||''}" style="left:${opts.left};top:${opts.top};font-size:${opts.size||'1.8rem'};"
    data-action="${opts.action}" data-payload="${opts.payload!==undefined?opts.payload:''}" aria-label="${opts.label||opts.action}">
    ${opts.emoji}<span class="tag">${opts.label||''}</span></button>`;
}

function starsHTML(count, top){
  let s='';
  for(let i=0;i<count;i++){
    const size = rand(1,2.6);
    s += `<div class="star" style="width:${size}px;height:${size}px;left:${rand(0,100)}vw;top:${rand(0,top||70)}vh;animation-duration:${rand(2,5)}s;"></div>`;
  }
  return s;
}
function firefliesHTML(count){
  let s='';
  for(let i=0;i<count;i++){
    s += `<div class="firefly" style="left:${rand(5,95)}vw;top:${rand(15,85)}vh;animation-delay:${rand(0,8)}s, ${rand(0,3)}s;"></div>`;
  }
  return s;
}
function cloudsHTML(count){
  let s='';
  for(let i=0;i<count;i++){
    const w = rand(60,160);
    s += `<div class="cloud" style="width:${w}px;height:${w*0.4}px;top:${rand(4,26)}vh;animation-duration:${rand(50,90)}s;animation-delay:-${rand(0,60)}s;"></div>`;
  }
  return s;
}
function petalsHTML(count, chars){
  let s='';
  for(let i=0;i<count;i++){
    const c = chars[i % chars.length];
    s += `<span class="petal" style="left:${rand(0,100)}vw;--drift:${rand(-80,80)}px;font-size:${rand(11,20)}px;animation-duration:${rand(9,18)}s;animation-delay:-${rand(0,14)}s;">${c}</span>`;
  }
  return s;
}

let activeTimers = [];
function trackInterval(fn, ms){ const id = setInterval(fn, ms); activeTimers.push(id); return id; }
function trackTimeout(fn, ms){ const id = setTimeout(fn, ms); activeTimers.push(id); return id; }
function clearAllTimers(){ activeTimers.forEach(id=>{ clearInterval(id); clearTimeout(id); }); activeTimers = []; }

function spawnBirdsLoop(container){
  trackInterval(()=>{
    const b = make('div','bird');
    b.textContent = Math.random()>0.5 ? '⌃' : '⌒';
    b.style.top = rand(6,22)+'vh';
    b.style.animationDuration = rand(7,12)+'s';
    container.appendChild(b);
    trackTimeout(()=> b.remove(), 12000);
  }, 7000);
}
function spawnShootingStars(container, onCatch){
  trackInterval(()=>{
    if(Math.random() > 0.6) return;
    const s = make('div','shooting-star');
    s.style.top = rand(4,22)+'vh';
    s.style.left = rand(55,92)+'vw';
    s.dataset.action = 'star';
    container.appendChild(s);
    trackTimeout(()=> s.remove(), 1900);
  }, 6000);
}

/* ---------------- modal ---------------- */
const overlay = q('#modal-overlay');
const modalCard = q('#modal-card');
function openModal(title, body, showPhoto){
  modalCard.innerHTML =
    (showPhoto ? '<div class="modal-photo">add a real photo from this memory here 🤍</div>' : '') +
    `<h3>${title}</h3><p>${body}</p><button class="modal-close" data-action="close-modal">close softly</button>`;
  overlay.classList.add('show');
}
function closeModal(){ overlay.classList.remove('show'); }
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

/* ---------------- content data ---------------- */
const flowerReasons = [
  "Because you check on people nobody else remembers to check on.",
  "Because you get excited over small good news like it's the biggest news in the world.",
  "Because you're just as beautiful with zero makeup on a random Tuesday.",
  "Because you apologize first, even when you don't have to.",
  "Because your 'good morning' texts somehow fix my whole day.",
  "Because you make me want to be a softer, better version of myself.",
  "Because you remember the tiny details I only mentioned once.",
  "Because you're brave even on the days you don't feel brave at all.",
  "Because home stopped being a place the day I met you.",
  "Because loving you is the easiest thing I've ever done."
];
const butterflyLines = [
  "You are so much stronger than you give yourself credit for.",
  "Your smile is genuinely one of my favorite things in this world.",
  "You make the people around you feel safer just by being there.",
  "You are worth every bit of effort it takes to love you well.",
  "I hope you know how deeply proud of you I am."
];
const shootingStarLetters = [
  "If I could freeze one ordinary moment with you forever, I don't think I'd pick something big. I'd pick something quiet, like this one.",
  "Wherever you are right now, some part of me is already thinking about you.",
  "I didn't know I could miss someone this much and still feel completely at peace, just knowing you exist.",
  "You are, without question, the best thing that has happened to me."
];
const memories = [
  {title:"the first message", story:"I still remember reading your first reply twice, just to make sure it was real. EDIT ME: swap this for the real story.", },
  {title:"the first phone call", story:"Your voice was nothing like I imagined, and somehow exactly what I needed. EDIT ME: swap this for the real story."},
  {title:"the first 'I love you'", story:"I don't think I've ever been that nervous about anything else. EDIT ME: swap this for the real story."},
  {title:"the day you laughed until you cried", story:"I've never wanted to protect a sound the way I wanted to protect that laugh. EDIT ME: swap this for the real story."},
  {title:"a quiet, ordinary evening", story:"Nothing happened. That was the whole point — it was perfect because it was just us. EDIT ME: swap this for the real story."}
];

/* ---------------- scene registry ---------------- */
const scenes = {};

scenes.intro = {
  render(){
    return `<div class="scene scene-intro" id="scene-root">
      <div class="ambient" id="intro-stars"></div>

/* ---------------- scene meta for wayfinder ---------------- */
const sceneMeta = {
  entrance:{icon:'🚪', label:'entrance'},
  garden:{icon:'🌷', label:'flower field'},
  river:{icon:'🌉', label:'the river'},
  cottage:{icon:'🏡', label:'the cottage'},
  tree:{icon:'🏮', label:'memory tree'},
  secret:{icon:'🧸', label:'secret garden'},
  dock:{icon:'🌙', label:'the dock'},
  hill:{icon:'⛰️', label:'the hill'}
};

/* ---------------- state machine ---------------- */
const state = { current:null, visited:new Set() };
const stage = q('#stage');
const veil = q('#veil');
const wayfinder = q('#wayfinder');

function renderScene(name){
  clearAllTimers();
  stage.innerHTML = scenes[name].render();
  scenes[name].init(stage);
  state.current = name;
  state.visited.add(name);
  renderWayfinder();
}

function renderWayfinder(){
  wayfinder.innerHTML = '';
  Object.keys(sceneMeta).forEach(key=>{
    if(!state.visited.has(key)) return;
    const meta = sceneMeta[key];
    const b = make('button', key===state.current ? 'current':'');
    b.textContent = meta.icon;
    b.title = meta.label;
    b.setAttribute('aria-label', 'go to ' + meta.label);
    b.addEventListener('click', ()=> goTo(key));
    wayfinder.appendChild(b);
  });
}

function goTo(name){
  if(!scenes[name] || name === state.current) return;
  veil.classList.remove('veil-reveal','veil-reset');
  // force reflow then cover
  void veil.offsetWidth;
  veil.classList.add('veil-cover');
  trackTimeout(()=>{
    renderScene(name);
    veil.classList.remove('veil-cover');
    veil.classList.add('veil-reveal');
    trackTimeout(()=>{
      veil.classList.remove('veil-reveal');
      veil.classList.add('veil-reset');
      requestAnimationFrame(()=> veil.classList.remove('veil-reset'));
    }, 700);
  }, 700);
}

/* ---------------- delegated click handling ---------------- */
document.addEventListener('click', (e)=>{
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  const payload = t.dataset.payload;

  if(action === 'goto'){ goTo(payload); return; }
  if(action === 'close-modal'){ closeModal(); return; }
  if(action === 'star'){
    const i = Math.floor(Math.random()*shootingStarLetters.length);
    openModal('a wish, caught mid-fall', shootingStarLetters[i]);
    return;
  }
  // butterflies (spawned ad hoc, see below) use action "butterfly"
  if(action === 'butterfly'){
    const i = +payload;
    openModal('a passing thought', butterflyLines[i % butterflyLines.length]);
    return;
  }
});

/* ---------------- ambient butterflies (a few, world-wide, click for compliments) ---------------- */
function sprinkleButterflies(root, count){
  for(let i=0;i<count;i++){
    const b = make('button','hotspot');
    b.textContent = '🦋';
    b.dataset.action = 'butterfly';
    b.dataset.payload = i;
    b.style.left = rand(8,88)+'vw';
    b.style.top = rand(15,75)+'vh';
    b.style.fontSize = '1.3rem';
    b.setAttribute('aria-label','a butterfly');
    root.appendChild(b);
  }
}
const origInit = {};
['entrance','garden','tree','secret'].forEach(key=>{
  origInit[key] = scenes[key].init;
  scenes[key].init = function(root){
    origInit[key](root);
    sprinkleButterflies(root.querySelector('.ambient') || root, 2);
  };
});

/* ---------------- boot ---------------- */
renderScene('intro');

})();
